font_family      Hack Nerd Font
font_size        11.5
line_spacing     1.1
letter_spacing   0.5

# Fox ML background & foreground
background            #1a1214
foreground            #d5c4b0

cursor                #d4985a
selection_background  #3a414b
selection_foreground  #d5c4b0

# Core Fox ML 16-color palette

color0  #1a1214
color1  #b05555
color2  #6b9a7a
color3  #c4b48a
color4  #7a9ab4
color5  #b8967a
color6  #7a9aab
color7  #d5c4b0

color8  #3a414b
color9  #c06868
color10 #7aab88
color11 #b8a87e
color12 #8a8aab
color13 #d4985a
color14 #7aab9a
color15 #d5d5d5

background_opacity 0.6

cursor_shape block
cursor_blink_interval 0

symbol_map U+1F300-U+1FAFF Noto Emoji

map ctrl+shift+a>m no_op
map ctrl+shift+a>l no_op
map ctrl+shift+a>1 no_op
map ctrl+shift+a>d no_op
