# ~/.config/hypr/hyprlock.conf

# Fox ML Theme - Matching Hyprland/Waybar/Kitty

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor = eDP-1
    path = /home/caramel/.wallpapers/foxml_night_dim_woods.jpg
    blur_size = 8
    blur_passes = 3
    vibrancy = 0.20
    brightness = 0.45
    contrast = 1.10
}

# Time display
label {
    monitor =
    text = $TIME
    color = rgba(d4985aff)
    font_size = 96
    font_family = Hack Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

# Date display
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba(d5c4b0ff)
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba(8a9a7aff)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 4
    rounding = 0
    inner_color = rgba(1a1214cc)
    outer_color = rgba(d4985aff)
    font_color = rgba(d5c4b0ff)
    font_family = Hack Nerd Font
    placeholder_text = Enter Password
    placeholder_color = rgba(3a414bff)
    dots_center = true
    dots_size = 0.33
    dots_spacing = 0.15
    fade_on_empty = false
    check_color = rgba(6b9a7aff)
    fail_color = rgba(b05555ff)
    fail_text = <i>$FAIL</i>
    fail_transition = 300
    capslock_color = rgba(c4b48aff)
    position = 0, -120
    halign = center
    valign = center
}

# Battery indicator (top-right). Reads any BAT* in /sys; degrades to empty
# string on desktops without a battery.
label {
    monitor =
    text = cmd[update:60000] sh -c 'for b in /sys/class/power_supply/BAT*/capacity; do [ -f "$b" ] && printf "BAT %s%%" "$(cat "$b")" && exit; done'
    color = rgba(7a7a7aff)
    font_size = 14
    font_family = Hack Nerd Font
    position = -30, -30
    halign = right
    valign = top
}

# Now-playing (bottom-center). Hidden when nothing's playing — playerctl
# exits non-zero with no output, hyprlock renders nothing.
label {
    monitor =
    text = cmd[update:5000] playerctl --no-messages metadata --format '♪ {{artist}} — {{title}}' 2>/dev/null
    color = rgba(8a9a7aff)
    font_size = 14
    font_family = Hack Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}
