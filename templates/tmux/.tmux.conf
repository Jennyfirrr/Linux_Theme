# ================= Base =================
set -sg escape-time 0
set -g repeat-time 300

set -g history-limit 200000

# Update environment variables when attaching (fixes Wayland in new sessions)
set -g update-environment "WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE DISPLAY SWAYSOCK HYPRLAND_INSTANCE_SIGNATURE"

set -g default-terminal "xterm-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -ga terminal-features ",*:24-bit:RGB"

# ================= Kill the real status bar =================
set -g status off

# ================= Pane footer as our "status bar" =================
# Pane footer as status
set -g pane-border-status bottom
set -g pane-border-style "fg=colour{{ANSI_MUTED}}"
set -g pane-active-border-style "fg=#{{PRIMARY}},bold"

# ================= Pane Visibility - Active pane emphasis =================
# Active pane solid plum, inactive pane transparent (inherits kitty opacity)
set -g window-style 'fg=#{{TMUX_INACTIVE_FG}},bg=default'
set -g window-active-style 'fg=#{{FG_PASTEL}},bg=default'

# Longer display time for pane numbers (prefix + q)
set -g display-panes-time 3000
set -g display-panes-active-colour colour{{ANSI_ACCENT2}}
set -g display-panes-colour colour{{ANSI_MUTED}}

# Pretty clock mode (Ctrl+a t)
set -g clock-mode-colour colour{{ANSI_ACCENT2}}
set -g clock-mode-style 24

# Message styling
set -g message-style 'fg=#{{WHITE}},bg=#{{PRIMARY}},bold'
set -g message-command-style 'fg=#{{WHITE}},bg=#{{ACCENT}}'

# Copy mode styling
set -g mode-style 'fg=#{{BG}},bg=#{{PRIMARY}}'

# Pane border format — active pane gets peach bar, inactive stays muted
set -g pane-border-format '#{?pane_active,#[fg=#{{BG}}#,bg=#{{PRIMARY}}] ◆ #S:#I │ #(~/.local/bin/tmux-pane-info "#{pane_current_path}" "#{pane_current_command}" 1) #[default],#[fg=colour{{ANSI_MUTED}}] ◇ #S:#I │ #(~/.local/bin/tmux-pane-info "#{pane_current_path}" "#{pane_current_command}" 0) }'

# ================= Keys / panes =================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g focus-events on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind Tab last-window
unbind '"'
unbind %
# Prefix + m = move current pane to a brand-new session and switch this client to it.
# break-pane -P -F captures the new window id so we can target it precisely
# instead of guessing by index. -k on move-window kills the placeholder window
# new-session creates, so the destination session contains only the popped pane.
bind m run-shell ' \
    sess="sess_$(date +%s)"; \
    win=$(tmux break-pane -d -P -F "#{window_id}"); \
    tmux new-session -d -s "$sess"; \
    tmux move-window -s "$win" -t "${sess}:1" -k; \
    tmux switch-client -t "$sess"; \
    tmux display-message "Pane moved to new session: $sess" \
'

# Prefix + M = pop current pane into its OWN kitty window (drag to portrait monitor).
# env -u TMUX unsets the inherited TMUX env var so the new kitty can actually
# attach to the popped session — without it tmux refuses to nest, attach falls
# back to the original session, and both kitty windows end up mirroring.
bind M run-shell ' \
    sess="popped_$(date +%s)"; \
    win=$(tmux break-pane -d -P -F "#{window_id}"); \
    tmux new-session -d -s "$sess"; \
    tmux move-window -s "$win" -t "${sess}:1" -k; \
    (kitty --detach -- env -u TMUX tmux attach -t "$sess" >/dev/null 2>&1 &); \
    tmux display-message "Pane popped to kitty window: $sess" \
'

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Copy mode with system clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config Reloaded"

#key bind for nested sessions
bind -n C-S-a send-prefix
