# ================= Base =================
set -sg escape-time 0
set -g repeat-time 300

set -g history-limit 200000

# Update environment variables when attaching (fixes Wayland in new sessions)
set -g update-environment "WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE DISPLAY SWAYSOCK HYPRLAND_INSTANCE_SIGNATURE"

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -ga terminal-features ",*:24-bit:RGB"

# Pass kitty graphics protocol through tmux (image previews in nvim/yazi/etc.)
set -g allow-passthrough on

# When the last window in a session closes, switch to the previous session
# instead of detaching the client. Pairs with `prefix + m` popped sessions —
# exiting the popped pane drops you back where you came from.
set -g detach-on-destroy previous

# Resize windows to the smallest client viewing them, not the largest. Avoids
# layout thrash when two clients on different sessions share a window (which
# happens with the kitty-pop binding below).
set -g aggressive-resize on

# Propagate session/window into the outer terminal title so kitty's window
# list shows what each tmux is doing.
set -g set-titles on
set -g set-titles-string "tmux: #S → #W"

# ================= Kill the real status bar =================
set -g status off

# ================= Pane footer as our "status bar" =================
# Pane footer as status
set -g pane-border-status bottom
set -g pane-border-style "fg=colour{{ANSI_MUTED}}"
set -g pane-active-border-style "fg=#{{PRIMARY}},bold"

# ================= Pane Visibility - Active pane emphasis =================
# Active pane solid plum, inactive pane transparent (inherits kitty opacity)
set -g window-style 'fg=#{{TMUX_INACTIVE_FG}},bg=default'
set -g window-active-style 'fg=#{{FG_PASTEL}},bg=default'

# Longer display time for pane numbers (prefix + q)
set -g display-panes-time 3000
set -g display-panes-active-colour colour{{ANSI_ACCENT2}}
set -g display-panes-colour colour{{ANSI_MUTED}}

# Pretty clock mode (Ctrl+a t)
set -g clock-mode-colour colour{{ANSI_ACCENT2}}
set -g clock-mode-style 24

# Message styling
set -g message-style 'fg=#{{WHITE}},bg=#{{PRIMARY}},bold'
set -g message-command-style 'fg=#{{WHITE}},bg=#{{ACCENT}}'

# Copy mode styling
set -g mode-style 'fg=#{{BG}},bg=#{{PRIMARY}}'

# Pane border format — active pane gets peach bar, inactive stays muted.
# tmux-pane-info is called once per pane (was twice — duplicated inside the
# active/inactive conditional), halving the fork rate on dense layouts.
set -g pane-border-format '#{?pane_active,#[fg=#{{BG}}#,bg=#{{PRIMARY}}] ◆ ,#[fg=colour{{ANSI_MUTED}}] ◇ }#S:#I │ #(~/.local/bin/tmux-pane-info "#{pane_current_path}" "#{pane_current_command}")#{?pane_active, #[default], }'

# ================= Keys / panes =================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g focus-events on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind Tab last-window
unbind '"'
unbind %

# Mirror keystrokes to all panes in the current window. Toggle on for
# multi-host SSH or "do this everywhere" moments; toggle off when done.
bind e setw synchronize-panes

# Prefix + m = move current pane to a brand-new session and switch this client to it.
# break-pane -P -F captures the new window id so we can target it precisely
# instead of guessing by index. -k on move-window kills the placeholder window
# new-session creates. -x/-y match the current client size — without them the
# placeholder is 80x24 and the popped TUI flashes a SIGWINCH redraw on attach.
# $$ in the session name avoids collisions if m fires twice in the same second.
bind m run-shell ' \
    cmd=$(tmux display-message -p "#{pane_current_command}"); \
    w=$(tmux display-message -p "#{client_width}"); \
    h=$(tmux display-message -p "#{client_height}"); \
    sess="pop-${cmd}-$$"; \
    win=$(tmux break-pane -d -P -F "#{window_id}"); \
    tmux new-session -d -s "$sess" -x "$w" -y "$h"; \
    tmux move-window -s "$win" -t "${sess}:1" -k; \
    tmux switch-client -t "$sess"; \
    tmux display-message -d 2000 "Popped to session: $sess" \
'

# Prefix + M = pop current pane into its OWN kitty window (drag to portrait monitor).
# env -u TMUX unsets the inherited TMUX env var so the new kitty can actually
# attach to the popped session — without it tmux refuses to nest, attach falls
# back to the original session, and both kitty windows end up mirroring.
# Same -x/-y and $$ rationale as `bind m` above.
bind M run-shell ' \
    cmd=$(tmux display-message -p "#{pane_current_command}"); \
    w=$(tmux display-message -p "#{client_width}"); \
    h=$(tmux display-message -p "#{client_height}"); \
    sess="kpop-${cmd}-$$"; \
    win=$(tmux break-pane -d -P -F "#{window_id}"); \
    tmux new-session -d -s "$sess" -x "$w" -y "$h"; \
    tmux move-window -s "$win" -t "${sess}:1" -k; \
    (kitty --detach -- env -u TMUX tmux attach -t "$sess" >/dev/null 2>&1 &); \
    tmux display-message -d 2000 "Popped to kitty: $sess" \
'

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# Copy mode with system clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
# Mouse drag-release pipes selection to wl-copy without exiting copy mode.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "wl-copy"
# Block selection toggle and whole-line yank.
bind -T copy-mode-vi r send -X rectangle-toggle
bind -T copy-mode-vi Y send -X copy-line

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config Reloaded"

#key bind for nested sessions
bind -n C-S-a send-prefix
