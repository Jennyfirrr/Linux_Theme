# ~/.config/hypr/hyprlock.conf

# Fox ML Theme - Matching Hyprland/Waybar/Kitty

general {
    hide_cursor = {{SHOW_WELCOME}}
    grace = 0
}

# Backgrounds — _personalize_hyprlock() in mappings.sh rewrites the block
# below into one named block per monitor (path = matching pre-rendered
# variant) after configure_monitors runs. The generic block is a fallback
# for one-shot template renders / fresh boots before configure_monitors.
# foxml:hyprlock-backgrounds-begin
background {
    monitor =
    path = ~/.wallpapers/{{WALLPAPER}}
    blur_size = 8
    blur_passes = 3
    vibrancy = 0.20
    brightness = 0.45
    contrast = 1.10
}
# foxml:hyprlock-backgrounds-end

# Time display
label {
    monitor =
    text = $TIME
    color = rgba({{PRIMARY}}ff)
    font_size = 96
    font_family = {{FONT_FAMILY}}
    position = 0, 200
    halign = center
    valign = center
}

# Date display
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba({{FG}}ff)
    font_size = 24
    font_family = {{FONT_FAMILY}}
    position = 0, 100
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba({{ACCENT}}ff)
    font_size = 18
    font_family = {{FONT_FAMILY}}
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 4
    rounding = 0
    inner_color = rgba({{BG}}cc)
    outer_color = rgba({{PRIMARY}}ff)
    font_color = rgba({{FG}}ff)
    font_family = {{FONT_FAMILY}}
    placeholder_text = Enter Password
    placeholder_color = rgba({{SURFACE}}ff)
    dots_center = {{SHOW_WELCOME}}
    dots_size = 0.33
    dots_spacing = 0.15
    fade_on_empty = false
    check_color = rgba({{GREEN}}ff)
    fail_color = rgba({{RED}}ff)
    fail_text = <i>$FAIL</i>
    fail_transition = 300
    capslock_color = rgba({{YELLOW}}ff)
    position = 0, -120
    halign = center
    valign = center
}

# Battery indicator (top-right). Reads any BAT* in /sys; degrades to empty
# string on desktops without a battery.
label {
    monitor =
    text = cmd[update:60000] sh -c 'for b in /sys/class/power_supply/BAT*/capacity; do [ -f "$b" ] && printf "BAT %s%%" "$(cat "$b")" && exit; done'
    color = rgba({{FG_DIM}}ff)
    font_size = 14
    font_family = {{FONT_FAMILY}}
    position = -30, -30
    halign = right
    valign = top
}

# Now-playing (bottom-center) — disabled. The cmd[] hook forks playerctl
# every 5s during the lock screen; if dbus is slow (common right after
# suspend/resume), the call blocks hyprlock's main loop and password
# submission appears to hang. Uncomment to restore at your own risk.
