# ~/.config/hypr/hyprlock.conf

# Fox ML Theme - Matching Hyprland/Waybar/Kitty

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor = eDP-1
    path = ~/.wallpapers/foxml_earthy.jpg
    blur_size = 12
    blur_passes = 4
    vibrancy = 0.10
    brightness = 0.10
    contrast = 1.05
}

# Time display
label {
    monitor =
    text = $TIME
    color = rgba({{PRIMARY}}ff)
    font_size = 96
    font_family = {{FONT_FAMILY}}
    position = 0, 200
    halign = center
    valign = center
}

# Date display
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgba({{FG}}ff)
    font_size = 24
    font_family = {{FONT_FAMILY}}
    position = 0, 100
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba({{ACCENT}}ff)
    font_size = 18
    font_family = {{FONT_FAMILY}}
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 4
    rounding = 0
    inner_color = rgba({{BG}}cc)
    outer_color = rgba({{PRIMARY}}ff)
    font_color = rgba({{FG}}ff)
    font_family = {{FONT_FAMILY}}
    placeholder_text = Enter Password
    placeholder_color = rgba({{SURFACE}}ff)
    dots_center = true
    dots_size = 0.33
    dots_spacing = 0.15
    fade_on_empty = false
    check_color = rgba({{GREEN}}ff)
    fail_color = rgba({{RED}}ff)
    fail_text = <i>$FAIL</i>
    fail_transition = 300
    capslock_color = rgba({{YELLOW}}ff)
    position = 0, -120
    halign = center
    valign = center
}
