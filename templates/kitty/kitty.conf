font_family      {{FONT_FAMILY}}
font_size        11.5
line_spacing     1.1
letter_spacing   0.5

# Fox ML background & foreground
background            #{{BG}}
foreground            #{{FG}}

cursor                #{{PRIMARY}}
selection_background  #{{SURFACE}}
selection_foreground  #{{FG}}

# Core Fox ML 16-color palette

color0  #{{BG}}
color1  #{{RED}}
color2  #{{GREEN}}
color3  #{{YELLOW}}
color4  #{{BLUE}}
color5  #{{SECONDARY}}
color6  #{{CYAN}}
color7  #{{FG}}

color8  #{{SURFACE}}
color9  #{{RED_BRIGHT}}
color10 #{{GREEN_BRIGHT}}
color11 #{{YELLOW_BRIGHT}}
color12 #{{BLUE_BRIGHT}}
color13 #{{PRIMARY}}
color14 #{{CYAN_BRIGHT}}
color15 #{{WHITE}}

background_opacity {{KITTY_BG_OPACITY}}
window_padding_width 15
placement_strategy center
hide_window_decorations yes

cursor_shape block
cursor_blink_interval 0

symbol_map U+1F300-U+1FAFF Noto Emoji
# CJK fallback for the welcome banner's kaomoji glyphs (じ, し, ノ, 〵, etc.).
# Hack/JetBrainsMono Nerd Font don't ship CJK; fontconfig also picks Noto Sans
# (Latin-only) for these codepoints, so kitty must be told explicitly.
symbol_map U+3000-U+30FF,U+FF00-U+FFEF,U+4E00-U+9FFF Noto Sans CJK JP

map ctrl+shift+a>m no_op
map ctrl+shift+a>l no_op
map ctrl+shift+a>1 no_op
map ctrl+shift+a>d no_op
