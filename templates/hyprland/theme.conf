# ╭──────────────────────────────────────────────────────────────────╮
# │                     Fox ML Theme                                 │
# ╰──────────────────────────────────────────────────────────────────╯
#
#   ┌─────────────────────────────────────┐
#   │           Color Palette             │
#   ├──────────────┬──────────────────────┤
#   │  bg          │  #{{BG}}             │
#   │  fg          │  #{{FG}}             │
#   │  slate       │  #{{SURFACE}}             │
#   │  peach       │  #{{PRIMARY}}             │
#   │  sage        │  #{{ACCENT}}             │
#   └──────────────┴──────────────────────┘

# ─────────────────────────────────────────
# General
# ─────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 4
    layout = dwindle

    col.active_border = rgba({{PRIMARY}}ff) rgba({{YELLOW_BRIGHT}}ff) 45deg   # peach → wheat
    col.inactive_border = rgba({{SURFACE}}66)                       # slate (dimmed)
}

# ─────────────────────────────────────────
# Decoration
# ─────────────────────────────────────────
decoration {
    rounding = 0

    blur {
        enabled = true
        size = 4
        passes = 2
        noise = 0.01
        contrast = 1.0
        brightness = 0.97
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.45)
        color_inactive = rgba(0, 0, 0, 0.25)
    }

    dim_inactive = true
    dim_strength = 0.08
}

# ─────────────────────────────────────────
# Animations
# ─────────────────────────────────────────
animations {
    enabled = yes

    bezier = foxEase, 0.16, 1.0, 0.3, 1.0
    bezier = foxSnap, 0.05, 0.9, 0.1, 1.0
    bezier = foxBounce, 0.68, -0.3, 0.265, 1.35
    bezier = foxSlow, 0.0, 0.6, 0.4, 1.0

    animation = windows, 1, 5, foxSnap, popin 92%
    animation = windowsIn, 1, 5, foxSnap, popin 92%
    animation = windowsOut, 1, 4, foxEase, popin 80%
    animation = windowsMove, 1, 4, foxSnap
    animation = border, 1, 12, foxSlow
    animation = borderangle, 1, 40, foxSlow, loop
    animation = fade, 1, 5, foxEase
    animation = fadeIn, 1, 4, foxEase
    animation = fadeOut, 1, 4, foxEase
    animation = workspaces, 1, 5, foxSnap, slide
    animation = layers, 1, 4, foxEase, fade
}

# ─────────────────────────────────────────
# Misc
# ─────────────────────────────────────────
misc {
    disable_hyprland_logo = true
}
