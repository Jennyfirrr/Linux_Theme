# Fox ML Theme for Yazi
# Matches waybar, hyprland, tmux, kitty, and spicetify

# Color Palette:
# bg:       #{{BG}}
# fg:       #{{FG}}
# slate:    #{{SURFACE}}
# peach:    #{{PRIMARY}}
# lavender: #{{ACCENT}}
# pink:     #{{SECONDARY}}

[manager]
cwd = { fg = "#{{PRIMARY}}", bold = true }

# Hovered
hovered         = { fg = "#{{BG}}", bg = "#{{PRIMARY}}", bold = true }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#{{YELLOW}}", bold = true, italic = true, underline = true }
find_position = { fg = "#{{ACCENT}}", bg = "reset", italic = true }

# Marker
marker_copied   = { fg = "#{{GREEN}}", bg = "#{{GREEN}}" }
marker_cut      = { fg = "#{{RED}}", bg = "#{{RED}}" }
marker_marked   = { fg = "#{{ACCENT}}", bg = "#{{ACCENT}}" }
marker_selected = { fg = "#{{SECONDARY}}", bg = "#{{SECONDARY}}" }

# Tab
tab_active   = { fg = "#{{BG}}", bg = "#{{PRIMARY}}", bold = true }
tab_inactive = { fg = "#{{FG_DIM}}", bg = "#{{SURFACE}}" }
tab_width    = 1

# Count
count_copied   = { fg = "#{{BG}}", bg = "#{{GREEN}}" }
count_cut      = { fg = "#{{BG}}", bg = "#{{RED}}" }
count_selected = { fg = "#{{BG}}", bg = "#{{SECONDARY}}" }

# Border
border_symbol = "│"
border_style  = { fg = "#{{TMUX_ACTIVE_BG}}" }

[mode]
normal_main = { fg = "#{{BG}}", bg = "#{{PRIMARY}}", bold = true }
normal_alt  = { fg = "#{{BG}}", bg = "#{{SECONDARY}}" }
select_main = { fg = "#{{BG}}", bg = "#{{SECONDARY}}", bold = true }
select_alt  = { fg = "#{{BG}}", bg = "#{{ACCENT}}" }
unset_main  = { fg = "#{{BG}}", bg = "#{{ACCENT}}", bold = true }
unset_alt   = { fg = "#{{BG}}", bg = "#{{SURFACE}}" }

[status]
overall  = { fg = "#{{PRIMARY}}" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label  = { fg = "#{{FG_PASTEL}}", bold = true }
progress_normal = { fg = "#{{PRIMARY}}", bg = "#{{SURFACE}}" }
progress_error  = { fg = "#{{RED}}", bg = "#{{SURFACE}}" }

# Permissions
perm_type = { fg = "#{{PRIMARY}}" }
perm_read = { fg = "#{{ACCENT}}" }
perm_write = { fg = "#{{SECONDARY}}" }
perm_exec = { fg = "#{{GREEN}}" }
perm_sep  = { fg = "#{{FG_DIM}}" }

[input]
border   = { fg = "#{{PRIMARY}}" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#{{PRIMARY}}" }
active   = { fg = "#{{SECONDARY}}", bold = true }
inactive = {}

[confirm]
border     = { fg = "#{{PRIMARY}}" }
title      = { fg = "#{{PRIMARY}}", bold = true }
content    = {}
list       = {}
btn_yes    = { bg = "#{{PRIMARY}}", fg = "#{{BG}}" }
btn_no     = { bg = "#{{SURFACE}}", fg = "#{{FG}}" }
btn_labels = [ "  Yes  ", "  No  " ]

[spot]
border = { fg = "#{{PRIMARY}}" }
title  = { fg = "#{{PRIMARY}}", bold = true }

[completion]
border   = { fg = "#{{PRIMARY}}" }
active   = { fg = "#{{SECONDARY}}", bold = true }
inactive = {}
icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#{{PRIMARY}}" }
title   = {}
hovered = { fg = "#{{SECONDARY}}", underline = true }

[which]
cols            = 3
mask            = { bg = "#{{BG}}" }
cand            = { fg = "#{{ACCENT}}" }
rest            = { fg = "#{{FG_DIM}}" }
desc            = { fg = "#{{SECONDARY}}" }
separator       = "  "
separator_style = { fg = "#{{SURFACE}}" }

[help]
on      = { fg = "#{{ACCENT}}" }
run     = { fg = "#{{SECONDARY}}" }
desc    = {}
hovered = { reversed = true, bold = true }
footer  = { fg = "#{{FG_DIM}}", bg = "#{{BG}}" }

[notify]
title_info  = { fg = "#{{GREEN}}" }
title_warn  = { fg = "#{{YELLOW}}" }
title_error = { fg = "#{{RED}}" }
icon_info  = ""
icon_warn  = ""
icon_error = ""

[filetype]
rules = [
    # Symlinks
    { is = "link", fg = "#{{CYAN}}", italic = true },
    { is = "orphan", fg = "#{{RED}}", italic = true },

    # Executables
    { is = "exec", fg = "#{{GREEN_BRIGHT}}" },

    # Images
    { mime = "image/*", fg = "#{{SECONDARY}}" },

    # Media
    { mime = "{audio,video}/*", fg = "#{{ACCENT}}" },

    # Archives
    { mime = "application/*zip*", fg = "#{{YELLOW}}" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#{{YELLOW}}" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#{{BLUE}}" },
    { mime = "application/vnd.*", fg = "#{{BLUE}}" },

    # Directories — bold peach like neo-tree
    { url = "*/", fg = "#{{PRIMARY}}", bold = true },

    # Fallback — peach to match tmux/statusbar
    { url = "*", fg = "#{{PRIMARY}}" },
]

[icon]
# Default icons
globs = []
dirs = []
files = []
exts = []
conds = []
