name: secret-scan

# Catches accidental secrets in pushes and PRs. gitleaks is the standard
# tool here — well-maintained, low false-positive rate, free for public
# repos. Runs on every push to main and every PR.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan retroactively for leaks
          # introduced in earlier commits, not just the latest push.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip the licence prompt — public repos use the OSS path.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
