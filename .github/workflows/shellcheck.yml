name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck (severity=error)
        # severity=error catches real bugs (undefined vars, broken quoting,
        # syntax errors). Stylistic warnings stay non-blocking initially —
        # tighten to --severity=warning later once the codebase is clean.
        run: |
          set -e
          mapfile -t scripts < <(
            grep -rIlE '^#!.*(bash|sh)\b' . \
              --exclude-dir=rendered \
              --exclude-dir=.git
          )
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts found"
            exit 0
          fi
          echo "Linting ${#scripts[@]} shell scripts:"
          printf '  %s\n' "${scripts[@]}"
          shellcheck --severity=error "${scripts[@]}"
