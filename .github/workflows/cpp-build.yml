name: cpp-build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # Ubuntu has g++ 13 + libcurl headers in apt; that's enough to build
    # every src/fox-*/ tool. We don't need Arch here — the build only
    # cares about a recent libstdc++ and a libcurl-dev. Distro-specific
    # behaviour (pacman, systemd, hyprland) is exercised in a separate
    # integration step on a real Arch host, not here.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ make libcurl4-openssl-dev

      - name: Fetch nlohmann/json header (fox-intel dep)
        run: |
          curl -fsSL \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp \
            -o src/fox-intel/json.hpp

      - name: List discovered tools
        run: make list

      - name: Build everything
        run: make

      - name: Run unit tests
        run: make test

      - name: Smoke-check fox-install --help
        run: ./src/fox-install/fox-install --help

      - name: Render parity check (fox-render-fast vs render.sh)
        run: |
          set -e
          rm -rf /tmp/native /tmp/legacy
          ./src/fox-render/fox-render-fast \
            themes/FoxML_Classic/palette.sh templates /tmp/native > /dev/null
          ./render.sh \
            themes/FoxML_Classic/palette.sh templates /tmp/legacy > /dev/null
          if diff -rq /tmp/native /tmp/legacy > /tmp/diff.log; then
            echo "Native renderer matches legacy render.sh byte-for-byte."
          else
            echo "Render parity broken:"
            cat /tmp/diff.log
            exit 1
          fi
