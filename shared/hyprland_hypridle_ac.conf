general {
    # Single source of truth for the lock invocation. hypridle fires this
    # whenever it sees a logind Lock signal — emitted by loginctl
    # lock-session, the on-timeout listener, or any other Wayland-aware
    # caller. The `pidof || hyprlock` guard de-dupes so a double-signal
    # (e.g. timeout firing during a manual lock) doesn't spawn a second
    # hyprlock instance.
    lock_cmd          = pidof hyprlock || hyprlock
    # Hold a sleep inhibit lock while lock_cmd is running. Suspend waits
    # until hyprlock has actually grabbed input, eliminating the race that
    # made password submission appear to hang after wake (the previous
    # `before_sleep_cmd = hyprlock` flow fired hyprlock asynchronously
    # right before suspend, sometimes with the seat still half-active).
    inhibit_sleep     = 2
    # Lock via the standard logind path. hypridle sees the Lock signal
    # back on dbus and fires lock_cmd above — no race, no async surprise.
    before_sleep_cmd  = loginctl lock-session
    after_sleep_cmd   = hyprctl dispatch dpms on; systemctl --user restart waybar
}

listener {
    timeout = 300
    on-timeout = loginctl lock-session
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
