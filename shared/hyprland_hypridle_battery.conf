general {
    before_sleep_cmd = hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on; systemctl --user restart waybar
}

listener {
    timeout = 180
    on-timeout = hyprlock
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 240
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
