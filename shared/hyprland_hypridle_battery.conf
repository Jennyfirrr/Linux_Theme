general {
    # See hyprland_hypridle_ac.conf for the rationale on lock_cmd /
    # inhibit_sleep / loginctl. Battery profile mirrors AC except for the
    # shorter idle timeouts below.
    lock_cmd          = pidof hyprlock || hyprlock
    inhibit_sleep     = 2
    before_sleep_cmd  = loginctl lock-session
    after_sleep_cmd   = hyprctl dispatch dpms on; systemctl --user restart waybar
}

listener {
    timeout = 180
    on-timeout = loginctl lock-session
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout = 240
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
