[background]
path = "/usr/share/wallpapers/foxml_earthy.jpg"
fit = "Cover"

[GTK]
application_prefer_dark_theme = true
cursor_theme_name = "catppuccin-mocha-peach-cursors"
cursor_theme_size = 30
font_name = "JetBrainsMono Nerd Font 12"
icon_theme_name = "Papirus-Dark"
theme_name = "Adwaita"

[commands]
reboot = ["systemctl", "reboot"]
poweroff = ["systemctl", "poweroff"]

[appearance]
greeting_msg = "F O X M L"

[widget.clock]
format = "%A · %I:%M %p"
resolution = "30000ms"
label_width = 200
