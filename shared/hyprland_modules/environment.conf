# ╭──────────────────────────────────────────────────────────────────╮
# │                        Environment                               │
# ╰──────────────────────────────────────────────────────────────────╯

# Wayland Session
env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland

# Cursor
env = XCURSOR_SIZE, 30
env = XCURSOR_THEME, catppuccin-mocha-peach-cursors

# Wayland
env = MOZ_ENABLE_WAYLAND, 1
# env = WLR_NO_HARDWARE_CURSORS, 1

# Apps
env = NIXOS_OZONE_WL, 1
env = SPOTIFY_USE_WAYLAND, 1

# Qt Theming
env = QT_QPA_PLATFORMTHEME, qt6ct

# SSH agent — gnome-keyring-daemon (started in autostart.conf) provides the
# socket; SSH_ASKPASS_REQUIRE=prefer forces the GUI dialog even with a TTY.
env = SSH_AUTH_SOCK, $XDG_RUNTIME_DIR/keyring/ssh
env = SSH_ASKPASS, /usr/lib/seahorse/ssh-askpass
env = SSH_ASKPASS_REQUIRE, prefer
