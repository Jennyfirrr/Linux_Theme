#---Workspace Layout---
workspace = 1, monitor:DP-1, default:true

# Optional autostart examples (commented)
# exec-once = spotify
exec-once = kitty --title Terminal1
# exec-once = discord
# exec-once = steam

# Window rule example for Spotify
windowrule = size 1800 1000, class:^(Spotify)$
windowrule = workspace special:music silent, class:^(Spotify)$
windowrule = float, class:^(Spotify)$
windowrule = center, class:^(Spotify)$

# Terminal placement (optional)
# windowrule = move 1000 600, title:^(Terminal1)$
# windowrule = size 800 400, title:^(Terminal1)$
