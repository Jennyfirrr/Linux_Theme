# ─── Workspace Layout ─────────────────────────
# Note: workspace 1 default-monitor binding lives in rules.conf so it can use
# the monitor name set in monitors.conf. Don't duplicate it here.
# Note: kitty + tmux startup is handled by autostart.conf — don't re-add it here
# or you'll get two terminals on login.

windowrule {
    name = spotify-music-scratchpad
    match:class = ^(Spotify)$

    float = yes
    size = 1800 1000
    center = yes
    workspace = special:music silent
}
