# ╭──────────────────────────────────────────────────────────────────╮
# │                         Keybinds                                 │
# ╰──────────────────────────────────────────────────────────────────╯

# ─────────────────────────────────────────
# App Variables
# ─────────────────────────────────────────
$terminal    = kitty tmux new-session
$browser     = env -u MOZ_ENABLE_WAYLAND -u LIBVA_DRIVER_NAME -u GBM_BACKEND -u WLR_NO_HARDWARE_CURSORS firefox
$fileManager = yazi
$menu        = ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/hub.sh
$coding      = ~/.local/bin/cursor
$chat        = discord

$mainMod = ALT

# ─────────────────────────────────────────
# Applications
# ─────────────────────────────────────────
bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       F,      exec, $browser
bind = $mainMod SHIFT, C,      exec, $coding
bind = $mainMod SHIFT, D,      exec, $menu
bind = $mainMod SHIFT, M,      exec, steam steam://open/main
bind = $mainMod SHIFT, Y,      exec, ~/.config/launchers/toggle/toggle_yazi.sh
bind = $mainMod SHIFT, T,      exec, ~/.config/launchers/toggle/toggle_btop.sh
bind = $mainMod SHIFT, N,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/network.sh
bind = $mainMod SHIFT, B,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/bluetooth.sh
bind = $mainMod SHIFT, A,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/audio_switcher.sh
bind = $mainMod SHIFT, P,      exec, hyprpicker -a
bind = $mainMod SHIFT, I,      exec, $chat
bind = $mainMod SHIFT, O,      exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod SHIFT, L,      exec, ~/.config/hypr/scripts/toggle_dpms.sh
bind = $mainMod,       B,      exec, killall -SIGUSR1 waybar
bind = $mainMod,       W,      exec, ~/.config/hypr/scripts/rotate_wallpaper.sh --cycle
bind = $mainMod,       V,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/clipmanager.sh text
bind = $mainMod SHIFT, V,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/clipmanager.sh image
bind = $mainMod SHIFT, K,      exec, ~/.config/hypr/scripts/panic.sh
bind = $mainMod SHIFT, X,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/powermenu.sh
# AI agent triage — pending Claude/Gemini notifications, hjkl, switches tmux to the originating pane.
bind = $mainMod SHIFT, E,      exec, ~/.config/hypr/scripts/toggle_rofi.sh ~/.config/hypr/scripts/agent_rofi.sh

# ─────────────────────────────────────────
# Media Keys
# ─────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd.sh volume up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd.sh volume down
bindl  = , XF86AudioMute,        exec, ~/.config/hypr/scripts/osd.sh volume mute
bindl  = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/osd.sh brightness up
bindl  = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/osd.sh brightness down
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindl  = , XF86AudioStop,        exec, playerctl stop

# ─────────────────────────────────────────
# Window Management
# ─────────────────────────────────────────
bind = $mainMod,       G, togglegroup
bind = $mainMod,       bracketleft,  changegroupactive, b
bind = $mainMod,       bracketright, changegroupactive, f
bind = $mainMod,       P, pin
bind = $mainMod,       S, togglesplit
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, G, togglefloating
bind = $mainMod SHIFT, G, centerwindow
bind = $mainMod SHIFT, R, exec, hyprctl reload

# ─────────────────────────────────────────
# Window Focus
# ─────────────────────────────────────────
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod SHIFT, Tab, cyclenext, prev
# Jump focus through only floating windows (skip tiled). Tiled-only inverse on $mod+CTRL+Tab.
# (We can't double up $mainMod since $mainMod is ALT — ALT+ALT+Tab wouldn't fire.)
bind = $mainMod, Tab, cyclenext, floating
bind = $mainMod CTRL, Tab, cyclenext, tiled
# Searchable keybind cheatsheet — fuzzy-find any binding by description
bind = $mainMod, slash, exec, ~/.local/bin/fox-cheatsheet

# ─────────────────────────────────────────
# Workspaces
# ─────────────────────────────────────────
bind = $mainMod,       comma,  workspace, e-1
bind = $mainMod,       period, workspace, e+1

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# ─────────────────────────────────────────
# Mouse
# ─────────────────────────────────────────
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ─────────────────────────────────────────
# Sandbox launcher
# ─────────────────────────────────────────
# Rofi-driven picker for one-shot sandboxed apps. Firejail wraps the
# target with --private so its tmpfs $HOME evaporates on close. Quick
# way to visit a sketchy URL or run an untrusted script without it
# touching your real dotfiles.
bind = $mainMod SHIFT, S, exec, fox-sandbox

# ─────────────────────────────────────────
# Ghost Mode (boss key)
# ─────────────────────────────────────────
# Toggles a "someone walked into the room" mode: hides waybar, mutes
# audio, opacifies all windows and bumps blur. Same keybind toggles
# back to normal. State persists across keypresses via a runtime file.
bind = $mainMod, G, exec, ~/.config/hypr/scripts/ghost-mode.sh

# ─────────────────────────────────────────
# Window switcher (rofi)
# ─────────────────────────────────────────
# Direct shortcut to the SysHub "Active Windows" picker — rofi -show window
# with the inputbar disabled and hjkl bound for navigation, matching the
# rest of the project's rofi modals. Same flags as hub.sh's Active Windows
# entry, just bypassing the SysHub menu.
bind = $mainMod, grave, exec, ~/.config/hypr/scripts/toggle_rofi.sh rofi -show window -kb-row-up "k,Up" -kb-row-down "j,Down" -kb-accept-entry "l,Return" -kb-cancel "Escape,h" -theme-str 'inputbar {enabled: false;}'

# ─────────────────────────────────────────
# TTY switch (diagnostics)
# ─────────────────────────────────────────
# CTRL+ALT+F1..F6 switches to a kernel TTY while Hyprland is responsive.
# Won't escape a wedged hyprlock — hyprlock holds the seat grab so neither
# Hyprland nor the kernel sees these keys. For wedge recovery, enable
# kernel.sysrq=1 in /etc/sysctl.d and use Alt+SysRq+r followed by Ctrl+Alt+F2.
#
# chvt requires CAP_SYS_TTY_CONFIG. Either run with `sudo chvt` via a
# NOPASSWD sudoers rule for the wheel user, or set chvt setuid root.
bind = CTRL ALT, F1, exec, chvt 1
bind = CTRL ALT, F2, exec, chvt 2
bind = CTRL ALT, F3, exec, chvt 3
bind = CTRL ALT, F4, exec, chvt 4
bind = CTRL ALT, F5, exec, chvt 5
bind = CTRL ALT, F6, exec, chvt 6
