# ╭──────────────────────────────────────────────────────────────────╮
# │                       Window Rules                               │
# ╰──────────────────────────────────────────────────────────────────╯

# ─────────────────────────────────────────
# Workspace Layout
# ─────────────────────────────────────────
workspace = 1, monitor:eDP-1, default:true

# ─────────────────────────────────────────
# Layer Rules — blur the launcher and notifications so they sit on
# the desktop instead of pasted on top. ignorezero skips fully
# transparent pixels so blur doesn't leak through gaps in the popup.
# ─────────────────────────────────────────
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications
layerrule = ignorezero, notifications
layerrule = blur, mako
layerrule = ignorezero, mako
layerrule = blur, dunst
layerrule = ignorezero, dunst

# ─────────────────────────────────────────
# Thunar (translucent file manager)
# ─────────────────────────────────────────
# Thunar transparency handled via GTK CSS (compositor opacity causes rubberband trail artifacts)

# ─────────────────────────────────────────
# Discord
# ─────────────────────────────────────────

# ─────────────────────────────────────────
# Yazi (Scratchpad)
# ─────────────────────────────────────────

# ─────────────────────────────────────────
# ncspot (Scratchpad)
# ─────────────────────────────────────────

# ─────────────────────────────────────────
# Steam / Games — translucent client, games stay opaque
# (game windows get their own class, so ^(steam)$ only catches
#  the launcher, library, store, settings, and friends/chat windows)
# ─────────────────────────────────────────
windowrule {
    name = steam-opacity
    match:class = ^(steam)$
    opacity = 0.85 0.85
}

# ─────────────────────────────────────────
# Foxml Suite (trading) — translucent
# ─────────────────────────────────────────
windowrule {
    name = foxml-suite-opacity
    match:class = ^(foxml_suite)$
    opacity = 0.85 0.85
}

windowrule {
    name = engine-gui-opacity
    match:class = ^(engine_gui)$
    opacity = 0.85 0.85
}
