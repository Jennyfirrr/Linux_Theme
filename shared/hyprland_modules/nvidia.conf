# ╭──────────────────────────────────────────────────────────────────╮
# │            Nvidia — full Wayland session on dGPU                 │
# ╰──────────────────────────────────────────────────────────────────╯
# Sourced from hyprland.conf only when install.sh was run with --nvidia.
# Routes Aquamarine to the discrete card and sets driver hints for
# VAAPI / EGL / GBM. install_nvidia() in mappings.sh patches the
# AQ_DRM_DEVICES path to match the target machine's dGPU at install time.

env = AQ_DRM_DEVICES, /dev/dri/by-path/pci-0000:01:00.0-card
env = LIBVA_DRIVER_NAME, nvidia
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = WLR_NO_HARDWARE_CURSORS, 1
