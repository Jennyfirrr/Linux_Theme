# ╭──────────────────────────────────────────────────────────────────╮
# │                         Autostart                                │
# ╰──────────────────────────────────────────────────────────────────╯

# ─────────────────────────────────────────
# Core Services
# ─────────────────────────────────────────
exec-once = ~/.config/hypr/scripts/env-init.sh
exec-once = ~/.config/hypr/scripts/startup.sh
# Audio: pipewire (modern Arch default) starts via systemd-user; no exec-once needed.
# If you're on classic pulseaudio, uncomment the next line.
# exec-once = pulseaudio --start
# Run the rotation script to ensure the correct time-of-day bucket is applied.
# The script handles starting awww-daemon and waiting for its socket.
exec-once = ~/.config/hypr/scripts/rotate_wallpaper.sh
# hypridle is launched (and its config swapped on AC/battery transitions) by
# the power-state-watcher.service systemd user unit, not directly here.

# ─────────────────────────────────────────
# Authentication
# ─────────────────────────────────────────
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg

# ─────────────────────────────────────────
# Clipboard History
# ─────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─────────────────────────────────────────
# Initial Apps
# ─────────────────────────────────────────
exec-once = kitty --title Terminal1 tmux new-session
