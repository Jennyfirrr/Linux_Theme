# ╭──────────────────────────────────────────────────────────────────╮
# │                         Autostart                                │
# ╰──────────────────────────────────────────────────────────────────╯

# ─────────────────────────────────────────
# Core Services
# ─────────────────────────────────────────
exec-once = ~/.config/hypr/scripts/env-init.sh
exec-once = ~/.config/hypr/scripts/startup.sh
# Audio: pipewire (modern Arch default) starts via systemd-user; no exec-once needed.
# If you're on classic pulseaudio, uncomment the next line.
# exec-once = pulseaudio --start
# Run the rotation script to ensure the correct time-of-day bucket is applied.
# The script handles starting awww-daemon and waiting for its socket.
exec-once = ~/.config/hypr/scripts/rotate_wallpaper.sh
# Hot-swap watcher (fox-monitor-watch.service) is managed via systemd user
# unit rather than exec-once. The systemd path survives SIGHUP and auto-
# restarts on failure; exec-once backgrounded scripts were exiting silently
# when Hyprland's spawn parent terminated.

# First-launch tour — shows the keybind cheatsheet on the first Hyprland
# session after install. Self-gated by ~/.local/share/foxml/.first-launch-shown,
# so this is silent on every session after the first.
exec-once = ~/.config/hypr/scripts/first-launch-tour.sh
# hypridle is launched (and its config swapped on AC/battery transitions) by
# the power-state-watcher.service systemd user unit, not directly here.

# ─────────────────────────────────────────
# Authentication
# ─────────────────────────────────────────
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg

# ─────────────────────────────────────────
# Clipboard History
# ─────────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ─────────────────────────────────────────
# Night Light (Earthy filter)
# ─────────────────────────────────────────
exec-once = wlsunset -t 4500 -T 6500

# ─────────────────────────────────────────
# Initial Apps
# ─────────────────────────────────────────
exec-once = kitty --title Terminal1 tmux new-session
