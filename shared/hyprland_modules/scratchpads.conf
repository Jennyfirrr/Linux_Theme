# ─── Scratchpads ─────────────────────────────
# Hyprland 0.54+ block syntax. Each rule = one window class.

windowrule {
    name = yazi-scratchpad
    match:class = ^(yazi)$

    float = yes
    size = 1500 900
    center = yes
    border_size = 0
    workspace = special:yazi silent
}

windowrule {
    name = ncspot-scratchpad
    match:class = ^(ncspot)$

    float = yes
    size = 1500 900
    center = yes
    workspace = special:music silent
}

windowrule {
    name = btop-scratchpad
    match:class = ^(btopterm)$

    float = yes
    size = 1400 1000
    workspace = special:btopterm silent
}

windowrule {
    name = waifu-scratchpad
    match:class = ^(waifu)$

    float = yes
    size = 2000 1400
    center = yes
    workspace = special silent
}
