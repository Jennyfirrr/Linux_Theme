# Minimal Hyprland config for greetd greeter
# Runs regreet inside Hyprland instead of cage — no TTY flash

exec-once = sleep 0.5 && regreet; hyprctl dispatch exit

# ─── Monitor ────────────────────────────────────
monitor = , preferred, auto, 1

# ─── Input ──────────────────────────────────────
input {
    kb_layout = us
}

# ─── Appearance (minimal — regreet handles its own styling) ──
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

decoration {
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

cursor {
    default_monitor = 0
}
