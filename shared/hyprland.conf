# FoxML Theme Hub — main Hyprland config
# Sources every module in ~/.config/hypr/modules/, EXCEPT:
#   - main_mod.conf  (duplicate of keybinds.conf — would cause double-bindings)
#   - hyprlock.conf  (hyprlock-syntax — belongs to hyprlock, not Hyprland)
# To override or add personal bindings/settings, append them below the source lines.

source = ~/.config/hypr/modules/app_shortcuts.conf
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/environment.conf
source = ~/.config/hypr/modules/general.conf
source = ~/.config/hypr/modules/input.conf
source = ~/.config/hypr/modules/keybinds.conf
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/rules.conf
source = ~/.config/hypr/modules/scratchpads.conf
source = ~/.config/hypr/modules/theme.conf
source = ~/.config/hypr/modules/workspace_layout.conf

# Nvidia (added by fox-install --nvidia)
source = ~/.config/hypr/modules/nvidia.conf
